name: Update Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Restore cache files
        uses: actions/cache/restore@v4
        with:
          path: output/cache
          key: output-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            output-cache-${{ runner.os }}-${{ github.ref_name }}-
      - run: |
          deno task start
      - name: Save cache files
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/cache
          key: output-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
      - name: Check versions.json changes
        id: versions_diff
        run: |
          if git diff --quiet -- output/versions.json; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
          else
            echo "changed=true" >>"$GITHUB_OUTPUT"
          fi
      - name: Create Pull Request
        if: steps.versions_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          title: "chore: update data"
          add-paths: output/versions.json

name: Update Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Restore cache files
        uses: actions/cache/restore@v5
        with:
          path: output/cache
          key: output-cache-${{ runner.os }}-${{ github.ref_name }}-v1
          restore-keys: |
            output-cache-${{ runner.os }}-${{ github.ref_name }}-
      - run: |
          deno task start
      - name: Save cache files
        if: always()
        uses: actions/cache/save@v5
        with:
          path: output/cache
          key: output-cache-${{ runner.os }}-${{ github.ref_name }}-v1-${{ github.run_id }}
      - name: Upload cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-cache-${{ github.run_id }}
          path: output/cache
          retention-days: 14
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          title: "chore: update data"
          add-paths: output/versions.json
